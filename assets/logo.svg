<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 680 150" role="img" aria-label="DRIFT — the early-warning court for AI quality">
  <!-- icon: a quality line drifting down through the acceptability floor,
       caught early (the alert dot) before the crossing -->
  <g transform="translate(10,15)">
    <rect x="0" y="0" width="120" height="120" rx="22" fill="none" stroke="#898781" stroke-width="2.5" opacity="0.55"/>
    <!-- the floor -->
    <line x1="14" y1="86" x2="106" y2="86" stroke="#d03b3b" stroke-width="2.5" stroke-dasharray="7 5"/>
    <!-- the drifting quality line -->
    <path d="M14,34 L34,37 L48,33 L62,44 L76,58 L90,74 L106,96"
          fill="none" stroke="#3987e5" stroke-width="5" stroke-linecap="round" stroke-linejoin="round"/>
    <!-- alert raised while still above the floor -->
    <circle cx="76" cy="58" r="7" fill="#fab219"/>
    <circle cx="76" cy="58" r="12" fill="none" stroke="#fab219" stroke-width="2" opacity="0.45"/>
  </g>
  <!-- wordmark -->
  <text x="160" y="83" font-family="system-ui, 'Segoe UI', Helvetica, Arial, sans-serif"
        font-size="64" font-weight="750" letter-spacing="6" fill="#3987e5">DRIFT</text>
  <text x="163" y="116" font-family="system-ui, 'Segoe UI', Helvetica, Arial, sans-serif"
        font-size="19" fill="#898781">the early-warning court for AI quality</text>
</svg>
